name: Outreach test send

# Sends ONE real outreach email to a test address (your own inbox by default)
# through the live Resend path — so you can confirm deliverability, branding, and
# the unsubscribe link before emailing any real prospect. Does not touch the
# lead queue or state branch.

on:
  workflow_dispatch:
    inputs:
      to:
        description: 'Address to send the single test email to'
        type: string
        default: 'tomahawkjunkremoval@gmail.com'

permissions:
  contents: read

jobs:
  test-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send one test email
        env:
          TO_EMAIL: ${{ inputs.to }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL }}
          OUTREACH_REPLY_TO: ${{ secrets.OUTREACH_REPLY_TO }}
          BUSINESS_NAME: ${{ secrets.BUSINESS_NAME }}
          BUSINESS_ADDRESS: ${{ secrets.BUSINESS_ADDRESS }}
          BUSINESS_PHONE: ${{ secrets.BUSINESS_PHONE }}
          BUSINESS_EMAIL: ${{ secrets.BUSINESS_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
          UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
        run: |
          mkdir -p data
          printf 'email,firstName,company,city,segment\n%s,Sam,Sample Community Association,Marietta,hoa\n' "$TO_EMAIL" > data/test.csv
          # Debug: print which DOMAIN the From / Reply-To resolve to (domains aren't
          # secrets, so they're not masked — lets us verify reply routing from logs).
          node -e "const f=(process.env.OUTREACH_FROM_EMAIL||process.env.RESEND_FROM_EMAIL||'').split('@')[1]||'(unset)'; const r=(process.env.OUTREACH_REPLY_TO||process.env.BUSINESS_EMAIL||'tomahawkjunkremoval@gmail.com').split('@')[1]; console.log('DEBUG  From domain:',f,'|  Reply-To domain:',r);"
          echo "Sending one test email to $TO_EMAIL ..."
          node scripts/send-campaign.js --file data/test.csv --live --limit 1 --delay 0
